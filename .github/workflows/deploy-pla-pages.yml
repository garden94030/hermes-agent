name: Deploy PLA Weapons Dashboard

on:
  push:
    branches:
      - main
      - claude/military-weapons-database-SKxGD
    paths:
      - 'pla_weapons_db/docs/**'
      - '.github/workflows/deploy-pla-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    # Only run on the fork, not upstream (which has its own deploy-site.yml)
    if: github.repository == 'garden94030/hermes-agent'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Stage PLA dashboard
        run: |
          mkdir -p _site
          cp -r pla_weapons_db/docs/* _site/
          # .nojekyll so Pages serves assets/ as-is (Jekyll skips leading-underscore dirs)
          touch _site/.nojekyll
          ls -la _site/
          ls -la _site/data/
          ls -la _site/assets/

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b  # v5

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4
