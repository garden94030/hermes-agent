name: Rebuild Dashboard Data

on:
  push:
    paths:
      - 'datasets/military-database/bases/**.json'
      - 'datasets/military-database/weapons/**.json'
      - 'datasets/military-database/scripts/build_dashboard_data.py'
      - '.github/workflows/dashboard-data.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    # Fork-safe: only run on the repo where the branch lives
    if: github.event.repository.name != ''
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'

      - name: Rebuild dashboard data.json
        run: |
          python3 datasets/military-database/scripts/build_dashboard_data.py

      - name: Validate dataset integrity
        run: |
          python3 datasets/military-database/scripts/validate.py

      - name: Commit regenerated data (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet docs/military-dashboard/dataset/data.json; then
            git add docs/military-dashboard/dataset/data.json
            git commit -m "chore(dashboard): rebuild data.json"
            git push
          else
            echo "No changes in data.json"
          fi
