<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLA 武器資料庫 | 中共解放軍各軍種裝備</title>
<meta name="description" content="中國人民解放軍（PLA）各軍種主要武器系統資料庫，資料來源引用 IISS、Janes、DoD CMPR 等專業智庫。">
<style>
  :root {
    --red:   #c62828;
    --dark:  #1a1a2e;
    --navy:  #16213e;
    --card:  #0f3460;
    --gold:  #e2b714;
    --text:  #e8e8e8;
    --muted: #9e9e9e;
    --green: #2e7d32;
    --border:#253a5e;
    --tag-bg:#1e3a5f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', 'Noto Sans TC', sans-serif;
    background: var(--dark); color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #0d0d1a 0%, #1a0000 50%, #0d0d1a 100%);
    border-bottom: 2px solid var(--red);
    padding: 16px 20px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-inner {
    max-width: 1400px; margin: 0 auto;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .logo { font-size: 1.6rem; }
  .header-titles h1 {
    font-size: clamp(1rem, 2.5vw, 1.4rem);
    color: var(--gold); letter-spacing: 1px;
  }
  .header-titles p { font-size: .75rem; color: var(--muted); margin-top: 2px; }
  .header-right { margin-left: auto; display: flex; gap: 8px; flex-wrap: wrap; }
  .stat-badge {
    background: var(--tag-bg); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 12px; font-size: .75rem;
    color: var(--gold);
  }

  /* ── Layout ── */
  .layout {
    max-width: 1400px; margin: 0 auto; padding: 16px;
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 16px;
  }
  @media(max-width:768px){
    .layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .mobile-filters { display: block !important; }
  }

  /* ── Sidebar ── */
  .sidebar { position: sticky; top: 80px; height: fit-content; }
  .filter-box {
    background: var(--navy); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px; margin-bottom: 12px;
  }
  .filter-box h3 { font-size: .8rem; color: var(--gold); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .filter-btn {
    display: flex; align-items: center; gap: 8px;
    width: 100%; background: none; border: none; color: var(--text);
    font-size: .85rem; padding: 7px 8px; border-radius: 6px;
    cursor: pointer; text-align: left; transition: background .15s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--card); color: #fff;
  }
  .filter-btn .count {
    margin-left: auto; background: var(--tag-bg);
    border-radius: 10px; padding: 1px 8px; font-size: .72rem; color: var(--muted);
  }
  .branch-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* ── Main ── */
  .main { min-width: 0; }

  /* Search + category bar */
  .controls {
    background: var(--navy); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px; margin-bottom: 14px;
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
  }
  .search-wrap { flex: 1; min-width: 200px; position: relative; }
  .search-wrap input {
    width: 100%; background: #111827; border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 9px 12px 9px 36px;
    font-size: .9rem;
  }
  .search-wrap input:focus { outline: none; border-color: var(--gold); }
  .search-wrap .ico {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: var(--muted); pointer-events: none;
  }
  select.cat-select {
    background: #111827; border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 9px 12px;
    font-size: .85rem; cursor: pointer;
  }
  .result-count { font-size: .8rem; color: var(--muted); margin-left: 4px; }

  /* mobile filter toggle */
  .mobile-filters { display: none; margin-bottom: 12px; }
  .mobile-filter-row {
    display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px;
  }
  .mob-btn {
    flex-shrink: 0; background: var(--navy); border: 1px solid var(--border);
    color: var(--text); border-radius: 20px; padding: 5px 12px;
    font-size: .78rem; cursor: pointer; white-space: nowrap;
  }
  .mob-btn.active { background: var(--card); border-color: var(--gold); color: var(--gold); }

  /* Grid */
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
  }

  /* Card */
  .card {
    background: var(--navy); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px;
    cursor: pointer; transition: transform .15s, border-color .15s;
    position: relative; overflow: hidden;
  }
  .card:hover { transform: translateY(-2px); border-color: var(--gold); }
  .card-accent {
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 4px; border-radius: 10px 0 0 10px;
  }
  .card-head { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 8px; }
  .card-icon { font-size: 1.5rem; flex-shrink: 0; margin-top: 2px; }
  .card-names { flex: 1; min-width: 0; }
  .card-names .cn { font-size: 1rem; font-weight: 600; color: #fff; }
  .card-names .en { font-size: .78rem; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tag-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .tag {
    background: var(--tag-bg); border-radius: 4px;
    padding: 2px 8px; font-size: .7rem; color: var(--muted);
  }
  .tag.year { color: var(--gold); border: 1px solid #3a3a10; }
  .tag.branch { border: 1px solid var(--border); }
  .notes-preview {
    font-size: .78rem; color: #aaa; line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }
  .source-count { font-size: .7rem; color: var(--muted); margin-top: 6px; }

  /* Modal */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.75); z-index: 500;
    align-items: center; justify-content: center; padding: 16px;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--navy); border: 1px solid var(--border);
    border-radius: 14px; max-width: 640px; width: 100%;
    max-height: 90vh; overflow-y: auto; padding: 24px;
    position: relative;
  }
  .modal-close {
    position: absolute; right: 16px; top: 16px;
    background: none; border: none; color: var(--muted);
    font-size: 1.4rem; cursor: pointer; line-height: 1;
  }
  .modal h2 { font-size: 1.2rem; color: var(--gold); margin-bottom: 4px; }
  .modal .en-name { font-size: .85rem; color: var(--muted); margin-bottom: 14px; }
  .modal-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .modal-tag {
    background: var(--tag-bg); border-radius: 6px;
    padding: 4px 10px; font-size: .78rem; color: var(--text);
  }
  .section-title {
    font-size: .75rem; text-transform: uppercase; letter-spacing: 1px;
    color: var(--gold); margin: 14px 0 8px; border-bottom: 1px solid var(--border);
    padding-bottom: 4px;
  }
  .spec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .spec-item { background: #111827; border-radius: 6px; padding: 8px 10px; }
  .spec-item .k { font-size: .7rem; color: var(--muted); }
  .spec-item .v { font-size: .85rem; color: #fff; margin-top: 2px; }
  .variants-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .variant-tag {
    background: #1a3050; border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 10px; font-size: .8rem;
  }
  .notes-text { font-size: .85rem; line-height: 1.6; color: #ccc; }
  .source-list { list-style: none; }
  .source-list li {
    font-size: .78rem; color: #9e9e9e; padding: 5px 0;
    border-bottom: 1px solid #1e2a3e; line-height: 1.5;
  }
  .source-list li::before { content: "📚 "; }
  .source-list li:last-child { border-bottom: none; }

  /* Charts */
  .charts-row {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; margin-bottom: 16px;
  }
  @media(max-width:600px){ .charts-row { grid-template-columns: 1fr; } }
  .chart-box {
    background: var(--navy); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px;
  }
  .chart-box h3 { font-size: .78rem; color: var(--gold); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .bar-label { font-size: .72rem; color: var(--muted); width: 80px; text-align: right; flex-shrink: 0; }
  .bar-track { flex: 1; background: #111827; border-radius: 3px; height: 14px; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width .4s; }
  .bar-val { font-size: .72rem; color: var(--text); width: 24px; flex-shrink: 0; }

  /* Empty state */
  .empty {
    grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--muted);
  }
  .empty .e-icon { font-size: 3rem; margin-bottom: 12px; }

  footer {
    text-align: center; padding: 24px; font-size: .75rem; color: var(--muted);
    border-top: 1px solid var(--border); margin-top: 32px;
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">🛡️</div>
    <div class="header-titles">
      <h1>PLA 武器系統資料庫</h1>
      <p>中國人民解放軍各軍種裝備 ‧ 資料來源：IISS / Janes / DoD CMPR / FAS / CSIS</p>
    </div>
    <div class="header-right" id="stats"></div>
  </div>
</header>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="filter-box">
      <h3>軍種</h3>
      <div id="branch-filters"></div>
    </div>
    <div class="filter-box">
      <h3>狀態</h3>
      <button class="filter-btn active" data-status="all" onclick="setStatus(this,'all')">
        <span>全部</span><span class="count" id="sc-all">0</span>
      </button>
      <button class="filter-btn" data-status="active" onclick="setStatus(this,'active')">
        <span>🟢 現役</span><span class="count" id="sc-active">0</span>
      </button>
      <button class="filter-btn" data-status="dev" onclick="setStatus(this,'dev')">
        <span>🔵 研發中</span><span class="count" id="sc-dev">0</span>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Mobile branch filter -->
    <div class="mobile-filters" id="mob-filters">
      <div class="mobile-filter-row" id="mob-branch-row"></div>
    </div>

    <!-- Charts -->
    <div class="charts-row">
      <div class="chart-box">
        <h3>各軍種武器數量</h3>
        <div id="branch-chart"></div>
      </div>
      <div class="chart-box">
        <h3>主要類別分布</h3>
        <div id="cat-chart"></div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <div class="search-wrap">
        <span class="ico">🔍</span>
        <input type="text" id="search" placeholder="搜尋武器名稱、型號、英文名…" oninput="render()">
      </div>
      <select class="cat-select" id="cat-select" onchange="render()">
        <option value="">所有類別</option>
      </select>
      <span class="result-count" id="result-count"></span>
    </div>

    <!-- Grid -->
    <div id="grid"></div>
  </main>
</div>

<footer>
  資料僅供學術研究參考 ‧ 來源：IISS Military Balance、Janes、U.S. DoD CMPR、FAS Nuclear Notebook、CSIS Missile Threat 等公開出版品
</footer>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal(null)">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<script src="data.js"></script>
<script>
const BRANCH_META = {
  PLAGF:   { label:'陸軍',   color:'#e53935', icon:'🚀' },
  PLAN:    { label:'海軍',   color:'#1976d2', icon:'⚓' },
  PLAAF:   { label:'空軍',   color:'#0288d1', icon:'✈️' },
  PLARF:   { label:'火箭軍', color:'#f57c00', icon:'🚀' },
  PLASSF:  { label:'戰支',   color:'#7b1fa2', icon:'🛰️' },
  PLAJLSF: { label:'聯勤',   color:'#388e3c', icon:'🔧' },
};
const CAT_ICONS = {
  '主戰坦克':'🪖','輕型坦克':'🪖','步兵戰車':'🚗','兩棲突擊車':'🚤',
  '輪式裝甲車':'🚗','自走砲':'💣','多管火箭砲':'🔴','防空系統':'🛡️',
  '反坦克飛彈':'🎯','攻擊直升機':'🚁','通用直升機':'🚁','單兵武器':'🔫',
  '航空母艦':'⛴️','驅逐艦':'🚢','巡防艦':'🚢','輕型護衛艦':'🚢',
  '兩棲攻擊艦':'⛴️','船塢登陸艦':'⛴️','戰略核潛艇':'🐋','攻擊核潛艇':'🐋',
  '常規潛艇':'🐋','艦載戰鬥機':'✈️','反艦飛彈':'🎯','反艦彈道飛彈':'🎯',
  '第五代戰鬥機':'✈️','第四代戰鬥機':'✈️','戰鬥轟炸機':'💥','戰略轟炸機':'💣',
  '預警機':'📡','運輸機':'🛫','無人機':'🤖',
  '洲際彈道飛彈':'☢️','中程彈道飛彈':'🚀','短程彈道飛彈':'🚀',
  '中遠程彈道飛彈':'🚀','高超音速飛彈':'⚡','巡航飛彈':'🎯',
  '反衛星武器':'🛰️','偵察衛星':'🛰️','導航衛星':'🛰️','電子戰':'📻',
  '空對空飛彈':'🎯','戰略轟炸機 (研發中)':'💣',
};

let activeBranch = 'all';
let activeStatus = 'all';

/* ── Init ── */
function init() {
  populateCatSelect();
  renderBranchFilters();
  renderCharts();
  renderStats();
  render();
}

function populateCatSelect() {
  const cats = [...new Set(PLA_DATA.map(w => w.category))].sort();
  const sel = document.getElementById('cat-select');
  cats.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    sel.appendChild(o);
  });
}

function renderStats() {
  const el = document.getElementById('stats');
  const total = PLA_DATA.length;
  const branches = new Set(PLA_DATA.map(w => w.branch_id)).size;
  const cats = new Set(PLA_DATA.map(w => w.category)).size;
  el.innerHTML = `
    <span class="stat-badge">🗂️ ${total} 筆裝備</span>
    <span class="stat-badge">🪖 ${branches} 軍種</span>
    <span class="stat-badge">📋 ${cats} 類別</span>
  `;
  // status counts
  const active = PLA_DATA.filter(w => !isDev(w)).length;
  const dev = PLA_DATA.length - active;
  document.getElementById('sc-all').textContent = total;
  document.getElementById('sc-active').textContent = active;
  document.getElementById('sc-dev').textContent = dev;
}

function isDev(w) {
  const s = (w.status || '') + ' ' + (w.in_service || '');
  return /研發|建造|測試|傳聞|planned|rumored/i.test(s);
}

function renderBranchFilters() {
  const counts = {};
  PLA_DATA.forEach(w => counts[w.branch_id] = (counts[w.branch_id]||0)+1);

  const container = document.getElementById('branch-filters');
  const mobRow = document.getElementById('mob-branch-row');

  // All button
  const allBtn = makeFilterBtn('all', '全部', Object.values(counts).reduce((a,b)=>a+b,0), '#e2b714');
  allBtn.classList.add('active');
  allBtn.onclick = () => setBranch(allBtn, 'all');
  container.appendChild(allBtn);

  // mob all
  const mAll = document.createElement('button');
  mAll.className = 'mob-btn active'; mAll.dataset.branch = 'all';
  mAll.textContent = '全部'; mAll.onclick = () => setMobBranch(mAll,'all');
  mobRow.appendChild(mAll);

  Object.entries(BRANCH_META).forEach(([id, m]) => {
    const cnt = counts[id] || 0;
    if (!cnt) return;
    const btn = makeFilterBtn(id, m.label, cnt, m.color);
    btn.onclick = () => setBranch(btn, id);
    container.appendChild(btn);

    const mb = document.createElement('button');
    mb.className = 'mob-btn'; mb.dataset.branch = id;
    mb.textContent = m.label; mb.onclick = () => setMobBranch(mb, id);
    mobRow.appendChild(mb);
  });
}

function makeFilterBtn(id, label, count, color) {
  const btn = document.createElement('button');
  btn.className = 'filter-btn'; btn.dataset.branch = id;
  btn.innerHTML = `
    <span class="branch-dot" style="background:${color}"></span>
    <span>${label}</span>
    <span class="count">${count}</span>
  `;
  return btn;
}

function setBranch(btn, id) {
  document.querySelectorAll('#branch-filters .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeBranch = id;
  render();
}

function setMobBranch(btn, id) {
  document.querySelectorAll('#mob-branch-row .mob-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeBranch = id;
  render();
}

function setStatus(btn, id) {
  document.querySelectorAll('[data-status]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeStatus = id;
  render();
}

/* ── Charts ── */
function renderCharts() {
  // Branch chart
  const bCounts = {};
  PLA_DATA.forEach(w => bCounts[w.branch_id] = (bCounts[w.branch_id]||0)+1);
  const maxB = Math.max(...Object.values(bCounts));
  const bHTML = Object.entries(bCounts)
    .sort((a,b) => b[1]-a[1])
    .map(([id, cnt]) => {
      const m = BRANCH_META[id] || {label:id, color:'#666'};
      const pct = (cnt/maxB*100).toFixed(0);
      return `<div class="bar-row">
        <span class="bar-label">${m.label}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${m.color}"></div></div>
        <span class="bar-val">${cnt}</span>
      </div>`;
    }).join('');
  document.getElementById('branch-chart').innerHTML = bHTML;

  // Category chart (top 8)
  const cCounts = {};
  PLA_DATA.forEach(w => cCounts[w.category] = (cCounts[w.category]||0)+1);
  const maxC = Math.max(...Object.values(cCounts));
  const cHTML = Object.entries(cCounts)
    .sort((a,b) => b[1]-a[1]).slice(0,8)
    .map(([cat, cnt]) => {
      const pct = (cnt/maxC*100).toFixed(0);
      return `<div class="bar-row">
        <span class="bar-label" style="font-size:.68rem">${cat.length>6?cat.slice(0,6)+'…':cat}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:#1565c0"></div></div>
        <span class="bar-val">${cnt}</span>
      </div>`;
    }).join('');
  document.getElementById('cat-chart').innerHTML = cHTML;
}

/* ── Render Grid ── */
function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const cat = document.getElementById('cat-select').value;

  const filtered = PLA_DATA.filter(w => {
    if (activeBranch !== 'all' && w.branch_id !== activeBranch) return false;
    if (cat && w.category !== cat) return false;
    if (activeStatus === 'active' && isDev(w)) return false;
    if (activeStatus === 'dev' && !isDev(w)) return false;
    if (q) {
      const hay = [w.name_cn, w.name_en, w.category, w.notes, w.manufacturer, ...(w.variants||[])].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  document.getElementById('result-count').textContent = `共 ${filtered.length} 筆`;

  const grid = document.getElementById('grid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty"><div class="e-icon">🔍</div><p>找不到符合條件的裝備</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map((w, i) => {
    const m = BRANCH_META[w.branch_id] || {label:w.branch_id, color:'#666'};
    const icon = CAT_ICONS[w.category] || '🔸';
    const yearTag = w.in_service ? `<span class="tag year">📅 ${w.in_service}</span>` : '';
    const devTag = isDev(w) ? `<span class="tag" style="color:#64b5f6">🔵 研發中</span>` : '';
    return `<div class="card" onclick="openModal(${i})">
      <div class="card-accent" style="background:${m.color}"></div>
      <div class="card-head">
        <div class="card-icon">${icon}</div>
        <div class="card-names">
          <div class="cn">${w.name_cn}</div>
          <div class="en">${w.name_en || '—'}</div>
        </div>
      </div>
      <div class="tag-row">
        <span class="tag branch" style="border-color:${m.color};color:${m.color}">${m.label}</span>
        <span class="tag">${w.category}</span>
        ${yearTag}${devTag}
      </div>
      ${w.notes ? `<div class="notes-preview">${w.notes}</div>` : ''}
      <div class="source-count">📚 ${w.sources.length} 項來源引用</div>
    </div>`;
  }).join('');

  // store filtered for modal lookup
  window._filtered = filtered;
}

/* ── Modal ── */
function openModal(idx) {
  const w = window._filtered[idx];
  if (!w) return;
  const m = BRANCH_META[w.branch_id] || {label:w.branch_id, color:'#666'};
  const icon = CAT_ICONS[w.category] || '🔸';

  let specsHTML = '';
  if (w.specs && Object.keys(w.specs).length) {
    const items = Object.entries(w.specs).map(([k,v]) =>
      `<div class="spec-item"><div class="k">${k}</div><div class="v">${v}</div></div>`
    ).join('');
    specsHTML = `<div class="section-title">規格諸元</div><div class="spec-grid">${items}</div>`;
  }

  let variantsHTML = '';
  if (w.variants && w.variants.length) {
    const tags = w.variants.map(v => `<span class="variant-tag">${v}</span>`).join('');
    variantsHTML = `<div class="section-title">型號衍生</div><div class="variants-list">${tags}</div>`;
  }

  let notesHTML = w.notes ? `<div class="section-title">備註</div><p class="notes-text">${w.notes}</p>` : '';
  let mfrHTML = w.manufacturer ? `<div class="section-title">製造商</div><p class="notes-text">${w.manufacturer}</p>` : '';

  const srcHTML = w.sources.length ? `
    <div class="section-title">📚 專業來源引用 (${w.sources.length})</div>
    <ul class="source-list">${w.sources.map(s=>`<li>${s}</li>`).join('')}</ul>
  ` : '';

  document.getElementById('modal-body').innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <span style="font-size:2rem">${icon}</span>
      <div>
        <h2>${w.name_cn}</h2>
        <div class="en-name">${w.name_en || ''}</div>
      </div>
    </div>
    <div class="modal-tags">
      <span class="modal-tag" style="border:1px solid ${m.color};color:${m.color}">${m.label}</span>
      <span class="modal-tag">${w.category}</span>
      ${w.in_service ? `<span class="modal-tag">📅 ${w.in_service}</span>` : ''}
      ${isDev(w) ? `<span class="modal-tag" style="color:#64b5f6">🔵 研發中</span>` : `<span class="modal-tag" style="color:#81c784">🟢 現役</span>`}
    </div>
    ${mfrHTML}${specsHTML}${variantsHTML}${notesHTML}${srcHTML}
  `;
  document.getElementById('overlay').classList.add('open');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('overlay')) return;
  document.getElementById('overlay').classList.remove('open');
}

document.addEventListener('keydown', e => { if (e.key==='Escape') document.getElementById('overlay').classList.remove('open'); });

init();
</script>
</body>
</html>
